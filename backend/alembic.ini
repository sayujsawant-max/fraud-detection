# Alembic configuration for the FraudShield backend.
#
# ``script_location`` points at ``backend/alembic`` so migrations live next
# to the rest of the backend codebase. The ``sqlalchemy.url`` value here is
# a placeholder — ``alembic/env.py`` overrides it with
# ``Settings.database_url_sync`` so we honour the project's DATABASE_URL
# environment variable.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# Placeholder — env.py reads DATABASE_URL from src.core.config and rewrites
# it to a sync driver before Alembic runs migrations.
sqlalchemy.url = postgresql+psycopg2://fraudshield:fraudshield_password@localhost:5432/fraudshield_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
