# ============================================================
# FraudShield MLOps — Docker Compose stack (v2 syntax)
# 7 services on the fraudshield-net bridge network.
# ============================================================

services:
  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:16
    container_name: fraudshield-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fraudshield-net

  # ---------- MLflow Tracking Server ----------
  mlflow:
    build:
      context: ./mlflow
    container_name: fraudshield-mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    networks:
      - fraudshield-net

  # ---------- FastAPI Backend ----------
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: fraudshield-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    env_file:
      - ../.env
    ports:
      - "8001:8000"
    volumes:
      - ../backend/src:/app/src
    networks:
      - fraudshield-net

  # ---------- Prefect Server ----------
  prefect:
    image: prefecthq/prefect:3-latest
    container_name: fraudshield-prefect
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_UI_URL: http://localhost:4200
    ports:
      - "4200:4200"
    volumes:
      - prefect_data:/root/.prefect
    networks:
      - fraudshield-net

  # ---------- Prometheus ----------
  prometheus:
    image: prom/prometheus:latest
    container_name: fraudshield-prometheus
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - fraudshield-net

  # ---------- Grafana ----------
  grafana:
    image: grafana/grafana:latest
    container_name: fraudshield-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - fraudshield-net

  # ---------- Next.js Frontend ----------
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: fraudshield-frontend
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    networks:
      - fraudshield-net

networks:
  fraudshield-net:
    driver: bridge
    name: fraudshield-net

volumes:
  postgres_data:
  mlflow_artifacts:
  prefect_data:
  prometheus_data:
  grafana_data:
