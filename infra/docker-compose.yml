# ============================================================
# FraudShield MLOps — Docker Compose stack (v2 syntax)
# 7 always-on services + 1 opt-in flow runner on the
# ``fraudshield-net`` bridge network.
# ============================================================

services:
  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:16
    container_name: fraudshield-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - fraudshield-net

  # ---------- MLflow Tracking Server ----------
  mlflow:
    build:
      context: ./mlflow
    container_name: fraudshield-mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    healthcheck:
      # MLflow exposes a tiny health endpoint at /health since 2.1.
      # Use a Python one-liner to avoid an apt-install for curl.
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health',timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - fraudshield-net

  # ---------- FastAPI Backend ----------
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: fraudshield-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    env_file:
      - ../.env
    ports:
      - "8001:8000"
    # Bind-mount the live source for fast iteration. Switch to a baked
    # image (delete this volume) for production-style benchmarking.
    volumes:
      - ../backend/src:/app/src
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - fraudshield-net

  # ---------- Prefect Server ----------
  prefect:
    image: prefecthq/prefect:3-latest
    container_name: fraudshield-prefect
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_UI_URL: http://localhost:4200
    ports:
      - "4200:4200"
    volumes:
      - prefect_data:/root/.prefect
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://localhost:4200/api/health',timeout=3).status==200 else 1)\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - fraudshield-net

  # ---------- Prefect Flow Server (Phase 6, opt-in profile) ----------
  # Runs both flows on cron via flow.serve(). Same image as the API so
  # the workflow modules + MLflow/SQLAlchemy deps come along for free.
  # Start with:
  #   docker compose -f infra/docker-compose.yml --profile flows up -d prefect-flows
  prefect-flows:
    profiles: ["flows"]
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: fraudshield-prefect-flows
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
      prefect:
        condition: service_started
      api:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      PREFECT_API_URL: http://prefect:4200/api
      API_BASE_URL: http://api:8000
    command: python scripts/deploy_prefect_flows.py
    volumes:
      - ../backend/src:/app/src
      - ../backend/scripts:/app/scripts
      - ../backend/data:/app/data
      - ../backend/reports:/app/reports
    networks:
      - fraudshield-net

  # ---------- Prometheus ----------
  prometheus:
    image: prom/prometheus:latest
    container_name: fraudshield-prometheus
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fraudshield-net

  # ---------- Grafana ----------
  grafana:
    image: grafana/grafana:latest
    container_name: fraudshield-grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Phase 7 — explicitly point Grafana at the bind-mounted dashboards.
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - fraudshield-net

  # ---------- Next.js Frontend ----------
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
    container_name: fraudshield-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - fraudshield-net

networks:
  fraudshield-net:
    driver: bridge
    name: fraudshield-net

volumes:
  postgres_data:
  mlflow_artifacts:
  prefect_data:
  prometheus_data:
  grafana_data:
