apiVersion: 1

# Auto-provisioned Prometheus datasource for FraudShield dashboards.
# Dashboards reference this datasource by uid="prometheus".
datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
      httpMethod: POST
